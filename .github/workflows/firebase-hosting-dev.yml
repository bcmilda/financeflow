name: Deploy to Firebase Hosting – DEV preview

on:
  push:
    branches:
      - dev

jobs:
  deploy_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FINANCEFLOW_A249C }}
          projectId: financeflow-a249c
          channelId: dev
          expires: 30d

