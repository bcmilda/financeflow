name: Deploy to Firebase Hosting – DEV preview

on:
  push:
    branches:
      - dev

jobs:
  deploy_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase preview channel (dev)
        run: firebase hosting:channel:deploy dev --expires 30d --project financeflow-a249c
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
